<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firre</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-container">
        <video id="bgVideo" playsinline preload="auto">
            <source src="Rizzler.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <audio id="bgAudio" preload="auto">
        <source src="rizzlersong.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>
    <div class="entry-overlay active">
        <button id="startButton">Click to continue</button>
    </div>
    <div class="text-overlay">
        <div class="text-reveal">
            <span class="text-line">F</span>
            <span class="text-line">I</span>
            <span class="text-line">R</span>
            <span class="text-line">R</span>
            <span class="text-line">E</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
